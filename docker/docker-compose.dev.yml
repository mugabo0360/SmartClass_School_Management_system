version: '3.9'
services:
  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../web:/app
    ports:
      - "3000:3000"

  backend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../backend:/app
    ports:
      - "4000:4000"
